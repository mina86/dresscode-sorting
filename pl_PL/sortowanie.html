<!DOCTYPE html>
<html lang=pl>
<meta name=viewport content="width=device-width,initial-scale=1">
<meta charset=UTF-8>
<title>Sortowanie</title>
<style>
  * {
    margin: 0;
    padding: 0;
  }
  html {
    color: #000;
    background: #efe0d2;
    color-theme: light;
  }
  #form {
    padding: 1em 2em;
    background: #fff;
  }
  #num {
    width: 3em;
  }
  label, select, #go {
    margin: 0 1em;
  }
  #status {
    margin: 1em;
  }
  #container {
    position: relative;
    margin: 1em;
  }
  #container div {
    position: absolute;
    width: 100%;
  }
</style>

<form id=form>
  <label for=num>
    Liczba elementów:
    <input type=number id=num name=num min=2 max=32 value=5 step=1>
  </label>
  <select id=algo name=algo required>
    <option value="">— wybierz algorytm —
  </select>
  <input type=submit value="Rozpocznij demonstrację" id=go>
  <p id=status>&nbsp;</p>
</form>
<div id=container></div>
<script src=../js/sorting.js></script>
<script>
formatCountsStats = (comparisons, swaps) => {
	return 'Liczba porównań: ' + comparisons + ', zamian: ' + swaps;
};

getStatusMessage = msgId => {
	switch (msgId) {
	case 'elementsSorted':
		return 'Elementy posortowane';
	case 'elementsNotSorted':
		return 'Elementy NIE zostały poprawnie posortowane';
	case 'badElementCount':
		return 'Nieprawidłowa liczba elementów';
	case 'infLoopError':
		return 'Algorytm wykonał zbyt dużo operacji. Wygląda ' +
			'to na nieskończoną pętlę.';
	case 'indexErrorStart':
		return 'Algorytm próbował operować na elemencie o indeksie ';
	case 'indexErrorEnd':
		return ', który jest poza tablicą.';
	case 'exceptionCaught':
		return 'Błąd w trakcie pracy algorytmu';
	}
};
</script>
<script src="algorytmy.js"></script>
